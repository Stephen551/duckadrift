name: 'DuckADRift — ADR drift detection & enforcement'
description: 'Enforce your Architecture Decision Records against the codebase. ADR checks fail CI only on what they can prove.'
author: 'Stephen551'
branding:
  icon: 'eye'
  color: 'gray-dark'

inputs:
  adr-dir:
    description: 'Override ADR directory auto-detection (docs/adr, doc/adr).'
    required: false
  working-directory:
    description: 'Path to the repo root to check.'
    required: false
    default: '.'
  github-token:
    description: 'Token for schedule-mode issue open/update. PR annotations need no token (native workflow commands).'
    required: false
    default: ${{ github.token }}

outputs:
  failing-count:
    description: 'Number of Tier 0 findings that fail CI.'
    value: ${{ steps.run.outputs.failing-count }}

runs:
  using: 'composite'
  steps:
    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Build duckadrift
      shell: bash
      working-directory: ${{ github.action_path }}
      run: |
        # The Action runs the api backend, so it omits the optional
        # @anthropic-ai/claude-code (a ~216 MB per-platform binary, ADR-0051): no
        # adopter runner carries it. The subscription backend inside an action is
        # unusual and then loud-refuses, which is correct.
        npm ci --omit=optional
        npm run build

    - name: Derive PR context
      if: github.event_name == 'pull_request'
      shell: bash
      env:
        # H1 (ADR-0013): the base ref is a branch name from the PR event, not
        # repo file content, so it's trusted-side — but interpolating it
        # directly into the run script is the script-injection shape. Pass it
        # through the environment and reference it as "$BASE_REF" so its value
        # can never be parsed as shell.
        BASE_REF: ${{ github.event.pull_request.base.ref }}
      run: |
        git fetch origin "$BASE_REF" --depth=1
        node "${{ github.action_path }}/action/pr-context-from-event.mjs" "$RUNNER_TEMP/duckadrift-pr-context.json"

    - name: Run duckadrift
      id: run
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        # H1 (ADR-0013): pass the adr-dir input through the environment rather
        # than interpolating it directly into the run script.
        ADR_DIR: ${{ inputs.adr-dir }}
        # Same convention for the PR number (M4.4 verifier fix): event-payload
        # values never interpolate into the run script — the runner substitutes
        # into env safely and bash sees a plain variable. Empty on non-PR events.
        PR_NUMBER: ${{ github.event.pull_request.number }}
      run: |
        set -e
        ARGS=(report . --out duckadrift-report.md)
        if [ -n "$ADR_DIR" ]; then
          ARGS+=(--adr-dir "$ADR_DIR")
        fi
        if [ -f "$RUNNER_TEMP/duckadrift-pr-context.json" ]; then
          ARGS+=(--pr-context "$RUNNER_TEMP/duckadrift-pr-context.json")
        fi

        set +e
        node "${{ github.action_path }}/dist/cli/index.js" "${ARGS[@]}"
        DUCKADRIFT_EXIT=$?
        set -e

        if [ "$DUCKADRIFT_EXIT" -eq 2 ]; then
          echo "::notice title=duckadrift::No ADR directory found yet — nothing to check. Add docs/adr/ or doc/adr/ (or set adr-dir) to get started."
          echo "failing-count=0" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        # Backstop for the silent-green failure (ADR-0013): the CLI writes a
        # loud failing report on a normal crash, but a catastrophic one (OOM,
        # SIGKILL) can leave no report at all. An abnormal exit with no report
        # must fail red, never pass green on a scan that never ran. `report`
        # exits 0 on every completed run regardless of findings, so a non-zero
        # exit here is only ever a crash.
        if [ "$DUCKADRIFT_EXIT" -ne 0 ] && [ ! -f duckadrift-report.json ]; then
          echo "::error title=duckadrift::duckadrift exited abnormally (code $DUCKADRIFT_EXIT) without writing a report — failing the check rather than passing green on an incomplete scan."
          echo "failing-count=0" >> "$GITHUB_OUTPUT"
          exit 1
        fi

        if [ -f duckadrift-report.md ]; then
          cat duckadrift-report.md >> "$GITHUB_STEP_SUMMARY"
        fi

        FAILING=0
        if [ -f duckadrift-report.json ]; then
          FAILING=$(node -e "console.log(JSON.parse(require('fs').readFileSync('duckadrift-report.json','utf-8')).failingCount)")
          node "${{ github.action_path }}/action/emit-annotations.mjs" duckadrift-report.json
        fi
        echo "failing-count=$FAILING" >> "$GITHUB_OUTPUT"

        # The calibrated interrupt push (ADR-0042). Under the shipped
        # calibration every channel is CLOSED, so this prints "0 interrupt(s)"
        # and provably never invokes gh — the eventual opening is a data
        # change, not a code change. A push failure warns and never blocks:
        # the annex in the job summary already carries every finding.
        if [ "${{ github.event_name }}" = "pull_request" ] && [ -f duckadrift-report.json ]; then
          node "${{ github.action_path }}/action/emit-interrupts.mjs" duckadrift-report.json pr "$PR_NUMBER" || echo "::warning title=duckadrift::interrupt push failed (comment permissions?) — interrupting findings remain in the annex and the job summary."
        fi

        # schedule / workflow_dispatch route findings to the tracking issue and
        # stay green — the issue IS the interrupt (PDR §2.1, ADR-0027). Those two
        # events are the only ones with a channel other than the job status.
        if { [ "${{ github.event_name }}" = "schedule" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; } && [ -f duckadrift-report.json ]; then
          node "${{ github.action_path }}/action/emit-interrupts.mjs" duckadrift-report.json schedule || echo "::warning title=duckadrift::interrupt push failed — interrupting findings remain in the sweep issue body."
          bash "${{ github.action_path }}/action/issue-sweep.sh" duckadrift-report.md duckadrift-report.json
          exit 0
        fi

        # No event silently absorbs failing findings (ADR-0027). pull_request
        # fails with the annotations as its detail; every other channel-less
        # event (push included) fails too, because the red is the only honest
        # signal it has — a finding that fired but blocked nothing is exactly the
        # quiet stand-down the Pact forbids.
        if [ "$FAILING" -gt 0 ]; then
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "::error title=duckadrift::$FAILING Tier 0 finding(s) failing — see annotations above and the job summary."
          else
            echo "::error title=duckadrift::$FAILING Tier 0 finding(s) failing on a '${{ github.event_name }}' event, which has no tracking-issue channel — failing the run is the only honest signal (ADR-0027). Wire this check to schedule or workflow_dispatch to route findings to a tracking issue instead."
          fi
          exit 1
        fi
        exit 0
