name: privacy-guard

# The un-bypassable half of the two-layer guard. The local pre-commit hook gives fast
# feedback and can be skipped with --no-verify; this runs server-side on every push and
# same-repo PR, reading the forbidden names from a secret so they never enter the tree.
on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  scan:
    # Skip fork PRs: secrets are not exposed to them, and external contributors do not have
    # the private names anyway. The guard exists to catch the maintainers' own leaks.
    if: >-
      github.event_name == 'push' ||
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Scan tree for forbidden names
        env:
          DENYLIST: ${{ secrets.PRIVACY_DENYLIST }}
        run: |
          if [ -z "$DENYLIST" ]; then
            echo "::warning::privacy-guard: PRIVACY_DENYLIST secret is not set — the guard is NOT enforcing yet. Set it in Settings > Secrets and variables > Actions."
            exit 0
          fi
          printf '%s\n' "$DENYLIST" > "$RUNNER_TEMP/deny.txt"
          git ls-files > "$RUNNER_TEMP/files.txt"
          node scripts/privacy-scan.mjs \
            --names "$RUNNER_TEMP/deny.txt" \
            --allow .privacy-allowlist \
            --ci \
            --from "$RUNNER_TEMP/files.txt"
