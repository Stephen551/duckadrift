name: Check-fixture parity

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Require a fixture change alongside any check-logic change
        # The PR body reaches the script through env, NEVER by direct
        # interpolation into run: — the body is attacker-authorable on fork
        # PRs, and an interpolated string is a shell (ADR-0030).
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          CHANGED=$(git diff --name-only "$BASE" "$HEAD")

          CHECK_CHANGED=$(echo "$CHANGED" | grep -E '^src/checks/.*\.ts$' || true)
          FIXTURE_CHANGED=$(echo "$CHANGED" | grep -E '^test/fixtures/tier0/' || true)

          if [ -n "$CHECK_CHANGED" ] && [ -z "$FIXTURE_CHANGED" ]; then
            # The auditable override (ADR-0030): an anchored whole line
            # `PARITY-ACK: <reason>`, reason mandatory, in a commit message
            # body or the PR body. Whole-line anchoring is ADR-ACK's B-5
            # lesson imported verbatim — an incidental prose mention never
            # acks a gate. Sources are handled as data (printf into grep,
            # never eval'd); carriage returns are stripped so a CRLF-bodied
            # bare `PARITY-ACK:` cannot smuggle its \r past the
            # non-empty-reason requirement.
            COMMIT_BODIES=$(git log --format=%B "$BASE".."$HEAD")
            ACKS=$(printf '%s\n%s' "$COMMIT_BODIES" "$PR_BODY" | tr -d '\r' | grep -E '^[ \t]*PARITY-ACK:[ \t]*[^ \t]' || true)
            if [ -n "$ACKS" ]; then
              echo "PARITY-ACK accepted:"
              echo "$ACKS"
              echo "Check-logic change without a fixture change is acknowledged on the record (ADR-0030)."
              exit 0
            fi
            echo "::error::This PR modifies check logic under src/checks/** without touching any fixture under test/fixtures/tier0/**. Every check ships with its isolating fixture in the same PR — add or update the corresponding fixture and its expected-findings.json. A behavior-identical change may pass by carrying an anchored 'PARITY-ACK: <reason>' line in a commit message body or the PR body, which is recorded in the run log (ADR-0030)."
            echo "Changed check files:"
            echo "$CHECK_CHANGED"
            exit 1
          fi

          echo "OK: no check-logic change without a corresponding fixture change."

  # The action-wrapper repros under test/action/*.mjs are committed guards that,
  # until now, nothing ran (ADR-0027) — a guard that never executes is untested
  # in every configuration. This job runs each one sequentially against the built
  # CLI, naming any that fail. Node 24 matches what the action declares.
  action-repros:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm ci
      - run: npm run build
      - name: Run every test/action/*.mjs
        run: |
          fail=0
          for f in test/action/*.mjs; do
            echo "::group::$f"
            if node "$f"; then
              echo "PASS: $f"
            else
              echo "::error title=action-repro::action repro failed: $f"
              fail=1
            fi
            echo "::endgroup::"
          done
          if [ "$fail" -ne 0 ]; then
            echo "::error::One or more action repros failed — see the named files above."
            exit 1
          fi
          echo "OK: all action repros passed."

  # The unit and behavioral suite (build, typecheck, 525 vitest tests) ran only
  # on developer machines — the same committed-guard-nothing-executes gap the
  # action repros had, at full size (ADR-0027). It now runs in CI on every change.
  unit-suite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm ci
      - run: npm run build
      - run: npm run typecheck
      - run: npm test
