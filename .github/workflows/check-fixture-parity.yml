name: Check-fixture parity

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Require a fixture change alongside any check-logic change
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          CHANGED=$(git diff --name-only "$BASE" "$HEAD")

          CHECK_CHANGED=$(echo "$CHANGED" | grep -E '^src/checks/.*\.ts$' || true)
          FIXTURE_CHANGED=$(echo "$CHANGED" | grep -E '^test/fixtures/tier0/' || true)

          if [ -n "$CHECK_CHANGED" ] && [ -z "$FIXTURE_CHANGED" ]; then
            echo "::error::This PR modifies check logic under src/checks/** without touching any fixture under test/fixtures/tier0/**. Every check ships with its isolating fixture in the same PR — add or update the corresponding fixture and its expected-findings.json."
            echo "Changed check files:"
            echo "$CHECK_CHANGED"
            exit 1
          fi

          echo "OK: no check-logic change without a corresponding fixture change."

  # The action-wrapper repros under test/action/*.mjs are committed guards that,
  # until now, nothing ran (ADR-0027) — a guard that never executes is untested
  # in every configuration. This job runs each one sequentially against the built
  # CLI, naming any that fail. Node 24 matches what the action declares.
  action-repros:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm ci
      - run: npm run build
      - name: Run every test/action/*.mjs
        run: |
          fail=0
          for f in test/action/*.mjs; do
            echo "::group::$f"
            if node "$f"; then
              echo "PASS: $f"
            else
              echo "::error title=action-repro::action repro failed: $f"
              fail=1
            fi
            echo "::endgroup::"
          done
          if [ "$fail" -ne 0 ]; then
            echo "::error::One or more action repros failed — see the named files above."
            exit 1
          fi
          echo "OK: all action repros passed."
