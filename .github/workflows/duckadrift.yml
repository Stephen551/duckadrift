name: duckadrift (self-check)

on:
  pull_request:
  schedule:
    - cron: "0 6 * * 1" # weekly decay sweep
  workflow_dispatch:

permissions:
  contents: read
  issues: write # schedule mode opens/updates the decay-sweep issue

jobs:
  duckadrift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./
